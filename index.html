<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Multi-Source Grocery App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0f19; color: #f1f5f9; padding-bottom: 110px; }
        
        /* Premium Vercel Style Header */
        header { 
            background: #111827; 
            border-bottom: 1px solid #1f2937;
            text-align: center; 
            padding: 24px 15px; 
            position: sticky; 
            top: 0; 
            z-index: 10;
        }
        header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
        header p { font-size: 0.85rem; color: #9ca3af; margin-top: 4px; }
        
        /* Sleek Search Bar */
        .search-container { padding: 16px; position: relative; z-index: 11; background: #0b0f19; }
        #search-bar { 
            width: 100%; 
            padding: 14px 16px 14px 42px; 
            font-size: 0.95rem; 
            background: #1f2937;
            color: white;
            border: 1px solid #374151; 
            border-radius: 12px; 
            outline: none; 
            transition: all 0.2s ease;
        }
        #search-bar:focus { border-color: #10b981; background: #111827; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
        .search-container::before {
            content: "🔍";
            position: absolute;
            left: 30px;
            top: 29px;
            font-size: 1rem;
            opacity: 0.5;
        }

        /* Category Titles */
        .category-section h2 { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: #10b981; 
            padding: 16px 20px 8px 20px; 
            font-weight: 700;
        }
        
        /* Modern Glass Cards */
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #111827; 
            padding: 16px 20px; 
            margin: 0 16px 8px 16px;
            border-radius: 14px;
            border: 1px solid #1f2937;
        }
        .item-name { font-size: 1rem; font-weight: 500; color: #f9fafb; line-height: 1.4; }
        .item-brand { font-size: 0.75rem; color: #6b7280; display: block; margin-top: 2px; text-transform: uppercase; font-weight: 600; }
        
        /* Quantity Counter */
        .counter { display: flex; align-items: center; gap: 12px; }
        .counter button { 
            width: 36px; 
            height: 36px; 
            font-size: 1.2rem; 
            font-weight: 600;
            border: none; 
            background-color: #1f2937; 
            color: #f3f4f6; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .counter button.plus { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .counter button:active { transform: scale(0.92); }
        .qty-count { font-size: 1rem; font-weight: 700; min-width: 24px; text-align: center; color: #fff; }
        
        /* Floating Send Bar */
        footer { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #111827; 
            padding: 16px 20px; 
            border-top: 1px solid #1f2937;
            z-index: 10; 
        }
        #send-btn { 
            width: 100%; 
            padding: 16px; 
            background-color: #25D366; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-weight: 700; 
            cursor: pointer;
        }
        #send-btn:active { transform: scale(0.99); opacity: 0.9; }
        .loading { text-align: center; padding: 40px; font-size: 1rem; color: #9ca3af; }
    </style>
</head>
<body>
    <header>
        <h1>🛒 Smart Grocery List</h1>
        <p>Unified catalog: BigBasket, DMart & Blinkit</p>
    </header>

    <div class="search-container">
        <input type="text" id="search-bar" placeholder="Search brands, items, or shops..." oninput="filterItems()">
    </div>

    <main id="grocery-container">
        <div class="loading">Parsing master database...</div>
    </main>

    <footer>
        <button id="send-btn" onclick="sendToWhatsApp()">💬 Send Order via WhatsApp</button>
    </footer>

    <script>
        let groceryItems = [];
        let cart = {};
        let searchQuery = "";
        let historyFrequency = JSON.parse(localStorage.getItem('megaGroceryHistory')) || {};

        // Ultra-Fast Stream Reader for Large Merged CSV File
        function fastCSVParse(text) {
            let lines = text.split('\n');
            if (lines.length === 0) return [];

            let headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            let idIdx = headers.indexOf('id');
            let nameIdx = headers.indexOf('name');
            let catIdx = headers.indexOf('category');
            let brandIdx = headers.indexOf('brand');
            let tagsIdx = headers.indexOf('tags');

            let items = [];
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;

                let row = [];
                let inQuotes = false;
                let cell = "";

                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { row.push(cell.trim()); cell = ""; }
                    else { cell += char; }
                }
                row.push(cell.trim());

                if (row[nameIdx]) {
                    items.push({
                        id: row[idIdx] || 'item_' + i,
                        name: row[nameIdx].replace(/^"|"$/g, ''),
                        category: row[catIdx] ? row[catIdx].replace(/^"|"$/g, '') : 'General',
                        brand: row[brandIndex] ? row[brandIdx].replace(/^"|"$/g, '') : 'Generic',
                        tags: row[tagsIdx] ? row[tagsIdx].toLowerCase() : ''
                    });
                }
            }
            return items;
        }

        async function loadMasterDataset() {
            try {
                const response = await fetch('merged_grocery_dataset.csv');
                if (!response.ok) throw new Error("File missing");
                const data = await response.text();
                groceryItems = fastCSVParse(data);
                renderItems();
            } catch (e) {
                document.getElementById('grocery-container').innerHTML = `
                    <div class="loading" style="color:#ef4444;">
                        ❌ Master dataset file missing.<br>
                        Run 'merge_groceries.py' inside the folder first!
                    </div>`;
            }
        }

        function renderItems() {
    const container = document.getElementById('grocery-container');
    container.innerHTML = '';

    // 1. Frequently ordered items stay at the top
    const frequentItems = groceryItems
        .filter(item => historyFrequency[item.id] && historyFrequency[item.id] > 0)
        .sort((a, b) => historyFrequency[b.id] - historyFrequency[a.id])
        .slice(0, 4);

    if (frequentItems.length > 0 && !searchQuery) {
        renderCategorySection("⭐️ Frequently Ordered", frequentItems, container);
    }

    // 2. Intelligent Search Filter and Sorter
    if (searchQuery.length >= 2) {
        let matches = [];
        let q = searchQuery.toLowerCase();

        // Step A: Collect all basic text matches across the 3 datasets
        for (let i = 0; i < groceryItems.length; i++) {
            let item = groceryItems[i];
            if (item.name.toLowerCase().includes(q) || item.tags.includes(q)) {
                matches.push(item);
            }
        }

        // Step B: Smart Relevance Ranking System
        matches.sort((a, b) => {
            let nameA = a.name.toLowerCase();
            let nameB = b.name.toLowerCase();

            // Condition 1: Does the product name START with the exact search term? (Highest Priority)
            let startsA = nameA.startsWith(q) ? 1 : 0;
            let startsB = nameB.startsWith(q) ? 1 : 0;
            if (startsA !== startsB) return startsB - startsA; 

            // Condition 2: Is the search term a whole standalone word in the title?
            let wordRegex = new RegExp('\\b' + q + '\\b');
            let wordA = wordRegex.test(nameA) ? 1 : 0;
            let wordB = wordRegex.test(nameB) ? 1 : 0;
            if (wordA !== wordB) return wordB - wordA;

            // Condition 3: Shorter item descriptions win (e.g., "Tomato 1kg" beats "Organic Creamy Tomato Pasta Bake")
            return nameA.length - nameB.length;
        });

        // Step C: Slice the top 30 cleanest hits so the interface doesn't lag
        let cleanMatches = matches.slice(0, 30);

        const categories = [...new Set(cleanMatches.map(item => item.category))];
        categories.forEach(category => {
            const itemsInCat = cleanMatches.filter(item => item.category === category);
            renderCategorySection(category, itemsInCat, container);
        });

        if (matches.length === 0) {
            container.innerHTML = '<div class="loading">No matching items found across directories.</div>';
        }
    } else if (!frequentItems.length) {
        container.innerHTML = '<div class="loading">Type at least 2 letters to perform master search...</div>';
    }
}
            const container = document.getElementById('grocery-container');
            container.innerHTML = '';

            const frequentItems = groceryItems
                .filter(item => historyFrequency[item.id] && historyFrequency[item.id] > 0)
                .sort((a, b) => historyFrequency[b.id] - historyFrequency[a.id])
                .slice(0, 4);

            if (frequentItems.length > 0 && !searchQuery) {
                renderCategorySection("⭐️ Frequently Ordered", frequentItems, container);
            }

            if (searchQuery.length >= 2) {
                let matches = [];
                for (let i = 0; i < groceryItems.length; i++) {
                    let item = groceryItems[i];
                    if (item.name.toLowerCase().includes(searchQuery) || item.tags.includes(searchQuery)) {
                        matches.push(item);
                        if (matches.length >= 30) break; 
                    }
                }

                const categories = [...new Set(matches.map(item => item.category))];
                categories.forEach(category => {
                    const itemsInCat = matches.filter(item => item.category === category);
                    renderCategorySection(category, itemsInCat, container);
                });

                if (matches.length === 0) {
                    container.innerHTML = '<div class="loading">No matching items found across directories.</div>';
                }
            } else if (!frequentItems.length) {
                container.innerHTML = '<div class="loading">Type at least 2 letters to perform master search...</div>';
            }
        }

        function renderCategorySection(title, items, targetContainer) {
            const catDiv = document.createElement('div');
            catDiv.className = 'category-section';
            catDiv.innerHTML = `<h2>${title}</h2>`;
            
            items.forEach(item => {
                const qty = cart[item.id] || 0;
                const itemRow = document.createElement('div');
                itemRow.className = 'item-row';
                itemRow.innerHTML = `
                    <div>
                        <span class="item-name">${item.name}</span>
                        <span class="item-brand">${item.brand}</span>
                    </div>
                    <div class="counter">
                        <button onclick="updateQty('${item.id}', -1)">-</button>
                        <span class="qty-count">${qty}</span>
                        <button class="plus" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>`;
                catDiv.appendChild(itemRow);
            });
            targetContainer.appendChild(catDiv);
        }

        function updateQty(id, change) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += change;
            if (cart[id] <= 0) delete cart[id];
            renderItems();
        }

        function filterItems() {
            searchQuery = document.getElementById('search-bar').value.toLowerCase().trim();
            renderItems();
        }

        function sendToWhatsApp() {
            let orderText = "📝 *COMBINED SUPERMARKET ORDER*\n-------------------------\n";
            let hasItems = false;

            groceryItems.forEach(item => {
                if (cart[item.id]) {
                    orderText += `✅ ${item.name} [${item.brand}] → *Qty: ${cart[item.id]}*\n`;
                    hasItems = true;
                    historyFrequency[item.id] = (historyFrequency[item.id] || 0) + 1;
                }
            });

            if (!hasItems) { alert("Please select items first!"); return; }
            orderText += "-------------------------\n Please package and deliver. Thank you!";

            localStorage.setItem('megaGroceryHistory', JSON.stringify(historyFrequency));
            window.open(`https://wa.me/?text=${encodeURIComponent(orderText)}`, '_blank');
            cart = {};
            renderItems();
        }

        loadMasterDataset();
    </script>
</body>
</html>
