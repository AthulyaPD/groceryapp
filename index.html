<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mom's Kaggle Grocery App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f6f8; padding-bottom: 90px; }
        header { background: #4CAF50; color: white; text-align: center; padding: 15px 10px; position: sticky; top: 0; z-index: 10; }
        .search-container { padding: 10px 15px; background: #fff; border-bottom: 1px solid #edf0f2; }
        #search-bar { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #e0e0e0; border-radius: 8px; outline: none; }
        #search-bar:focus { border-color: #4CAF50; }
        .category-section h2 { font-size: 0.95rem; text-transform: uppercase; color: #2E7D32; padding: 15px 15px 5px 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: white; padding: 14px 15px; border-bottom: 1px solid #edf0f2; }
        .item-name { font-size: 1.05rem; padding-right: 10px; line-height: 1.3; }
        .item-brand { font-size: 0.8rem; color: #777; display: block; margin-top: 2px; text-transform: uppercase; }
        .counter { display: flex; align-items: center; gap: 12px; }
        .counter button { width: 40px; height: 40px; font-size: 1.4rem; border: none; background-color: #e8f5e9; color: #2E7D32; border-radius: 8px; cursor: pointer; }
        .qty-count { font-size: 1.1rem; font-weight: bold; min-width: 24px; text-align: center; }
        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.06); z-index: 10; }
        #send-btn { width: 100%; padding: 16px; background-color: #25D366; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; }
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>🛒 Smart Grocery List</h1>
    </header>

    <div class="search-container">
        <input type="text" id="search-bar" placeholder="🔍 Search 28,000+ items (e.g. Atta, Dahi)..." oninput="filterItems()">
    </div>

    <main id="grocery-container">
        <div class="loading">Loading Kaggle Dataset...</div>
    </main>

    <footer>
        <button id="send-btn" onclick="sendToWhatsApp()">💬 Send to WhatsApp</button>
    </footer>

    <script>
    let groceryItems = [];
    let cart = {};
    let searchQuery = "";
    let historyFrequency = JSON.parse(localStorage.getItem('groceryHistory')) || {};

    // 1. Crash-Proof, lightning-fast CSV Parser (replaces slow RegEx lookaheads)
    function fastCSVParse(text) {
        let lines = text.split('\n');
        if (lines.length === 0) return [];

        // Clean headers to find correct index numbers
        let headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/^"|"$/g, ''));
        let prodIndex = headers.indexOf('product');
        let catIndex = headers.indexOf('category');
        let brandIndex = headers.indexOf('brand');

        // Fallbacks if header names are slightly different in Kaggle
        if (prodIndex === -1) prodIndex = 1; 
        if (catIndex === -1) catIndex = 2;
        if (brandIndex === -1) brandIndex = 3;

        let items = [];

        // Fast char-by-char loop for every row
        for (let i = 1; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            let row = [];
            let inQuotes = false;
            let currentCell = "";

            for (let j = 0; j < line.length; j++) {
                let char = line[j];
                if (char === '"') {
                    inQuotes = !inQuotes; // Toggle quotes flag
                } else if (char === ',' && !inQuotes) {
                    row.push(currentCell.trim());
                    currentCell = "";
                } else {
                    currentCell += char;
                }
            }
            row.push(currentCell.trim()); // Push last item

            let name = row[prodIndex];
            let category = row[catIndex];
            let brand = row[brandIndex] || "Generic";

            if (name && category) {
                items.push({
                    id: 'item_' + i,
                    name: name,
                    category: category,
                    brand: brand
                });
            }
        }
        return items;
    }

    // 2. Fetch logic with case-insensitive fallbacks for Vercel servers
    async function loadLocalCSV() {
        const fileNames = ['BigBasket Products.csv', 'bigbasket products.csv', 'Bigbasket Products.csv'];
        let loaded = false;

        for (let fileName of fileNames) {
            try {
                const response = await fetch(fileName);
                if (!response.ok) continue; // Try next casing variation if 404
                
                const data = await response.text();
                groceryItems = fastCSVParse(data);
                
                if (groceryItems.length > 0) {
                    loaded = true;
                    break; 
                }
            } catch (e) {
                console.log("Failed fetching filename variant:", fileName);
            }
        }

        if (loaded) {
            renderItems();
        } else {
            document.getElementById('grocery-container').innerHTML = `
                <div class="loading" style="color:red; font-size:1rem; padding:20px;">
                    ❌ Database Load Failure<br><br>
                    <small style="color:#555; text-align:left; display:block;">
                        1. Ensure <b>BigBasket Products.csv</b> is directly inside your main folder (not hidden inside a folder of the same name).<br><br>
                        2. Ensure your Vercel drag-and-drop included the CSV alongside your index.html.
                    </small>
                </div>`;
        }
    }

    function renderItems() {
        const container = document.getElementById('grocery-container');
        container.innerHTML = '';

        // Frequently ordered items display first
        const frequentItems = groceryItems
            .filter(item => historyFrequency[item.id] && historyFrequency[item.id] > 0)
            .sort((a, b) => historyFrequency[b.id] - historyFrequency[a.id])
            .slice(0, 4);

        if (frequentItems.length > 0 && !searchQuery) {
            renderCategorySection("⭐️ Frequently Ordered", frequentItems, container);
        }

        // Live filtration loop optimized for mobile screens
        if (searchQuery.length >= 2) {
            let matches = [];
            let q = searchQuery.toLowerCase();

            for (let i = 0; i < groceryItems.length; i++) {
                let item = groceryItems[i];
                if (item.name.toLowerCase().includes(q) || 
                    item.category.toLowerCase().includes(q) || 
                    item.brand.toLowerCase().includes(q)) {
                    matches.push(item);
                    if (matches.length >= 25) break; // Cuts off early to keep UI buttery smooth
                }
            }

            const categories = [...new Set(matches.map(item => item.category))];
            categories.forEach(category => {
                const itemsInCat = matches.filter(item => item.category === category);
                renderCategorySection(category, itemsInCat, container);
            });

            if (matches.length === 0) {
                container.innerHTML = '<div class="loading">No matching items found. Try another spelling!</div>';
            }
        } else if (!frequentItems.length) {
            container.innerHTML = '<div class="loading">Type 2 or more letters above to search the store...</div>';
        }
    }

    function renderCategorySection(title, items, targetContainer) {
        const catDiv = document.createElement('div');
        catDiv.className = 'category-section';
        catDiv.innerHTML = `<h2>${title}</h2>`;
        
        items.forEach(item => {
            const qty = cart[item.id] || 0;
            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            itemRow.innerHTML = `
                <div>
                    <span class="item-name">${item.name}</span>
                    <span class="item-brand">${item.brand}</span>
                </div>
                <div class="counter">
                    <button onclick="updateQty('${item.id}', -1)">-</button>
                    <span class="qty-count">${qty}</span>
                    <button onclick="updateQty('${item.id}', 1)">+</button>
                </div>`;
            catDiv.appendChild(itemRow);
        });
        targetContainer.appendChild(catDiv);
    }

    function updateQty(id, change) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += change;
        if (cart[id] <= 0) delete cart[id];
        renderItems();
    }

    function filterItems() {
        searchQuery = document.getElementById('search-bar').value.toLowerCase().trim();
        renderItems();
    }

    function sendToWhatsApp() {
        let orderText = "📝 *NEW GROCERY ORDER*\n-------------------------\n";
        let hasItems = false;

        groceryItems.forEach(item => {
            if (cart[item.id]) {
                orderText += `✅ ${item.name} (${item.brand}) → *Qty: ${cart[item.id]}*\n`;
                hasItems = true;
                historyFrequency[item.id] = (historyFrequency[item.id] || 0) + 1;
            }
        });

        if (!hasItems) { alert("Please select items first!"); return; }
        orderText += "-------------------------\n Please deliver as soon as possible. Thanks!";

        localStorage.setItem('groceryHistory', JSON.stringify(historyFrequency));
        window.open(`https://wa.me/?text=${encodeURIComponent(orderText)}`, '_blank');
        cart = {};
        renderItems();
    }

    // Initialize 
    loadLocalCSV();
</script>
</body>
</html>
