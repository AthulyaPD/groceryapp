<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery List App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b0f19; color: #f1f5f9; padding-bottom: 110px; }
        
        /* Layout Header */
        header { 
            background: #111827; 
            border-bottom: 1px solid #1f2937;
            text-align: center; 
            padding: 20px 15px; 
            position: sticky; 
            top: 0; 
            z-index: 10;
        }
        header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
        
        /* Floating Actions Bar */
        .action-row { display: flex; gap: 10px; padding: 10px 16px 0 16px; background: #0b0f19; }
        .action-btn {
            background: #1f2937; color: white; border: 1px solid #374151;
            padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
        }

        /* Search Controls */
        .search-container { padding: 12px 16px; position: relative; z-index: 9; background: #0b0f19; }
        #search-bar { 
            width: 100%; padding: 14px 16px 14px 42px; font-size: 0.95rem; 
            background: #1f2937; color: white; border: 1px solid #374151; 
            border-radius: 12px; outline: none; transition: all 0.2s ease;
        }
        #search-bar:focus { border-color: #10b981; background: #111827; }
        .search-container::before { content: "🔍"; position: absolute; left: 30px; top: 25px; font-size: 1rem; opacity: 0.5; }

        /* Categorization styling */
        .category-section h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #10b981; padding: 16px 20px 8px 20px; font-weight: 700; }
        
        /* Master Grid Layout Items */
        .item-row { 
            background: #111827; padding: 14px 16px; margin: 0 16px 8px 16px;
            border-radius: 14px; border: 1px solid #1f2937;
            display: flex; flex-direction: column; gap: 10px;
        }
        @media(min-width: 400px) {
            .item-row { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        .item-details { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .item-title-block { display: flex; flex-direction: column; }
        .item-name { font-size: 1rem; font-weight: 500; color: #f9fafb; }
        .item-meta { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }
        
        /* Control adjusters */
        .controls-wrapper { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
        .unit-selector {
            background: #1f2937; color: #9ca3af; border: 1px solid #374151;
            padding: 6px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; outline: none;
        }
        .unit-selector:focus { border-color: #10b981; }
        
        /* Counter Engine */
        .counter { display: flex; align-items: center; gap: 10px; }
        .counter button { 
            width: 34px; height: 34px; font-size: 1.2rem; font-weight: 600; border: none; 
            background-color: #1f2937; color: #f3f4f6; border-radius: 8px; cursor: pointer;
        }
        .counter button.plus { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .qty-count { font-size: 0.95rem; font-weight: 700; min-width: 24px; text-align: center; color: #fff; }
        
        /* Slide-up Overlays & Panels */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
            z-index: 100; display: none; opacity: 0; transition: opacity 0.2s ease;
        }
        .panel {
            position: fixed; bottom: -100%; left: 0; right: 0; max-height: 80vh;
            background: #111827; border-top: 1px solid #1f2937;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            z-index: 101; display: flex; flex-direction: column;
            transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
        .panel-title { font-size: 1.1rem; font-weight: 700; }
        .close-panel { background: none; border: none; color: #9ca3af; font-size: 1.3rem; cursor: pointer; }
        .panel-content { padding: 16px; overflow-y: auto; flex-grow: 1; }

        /* Cart View List Row Styles */
        .cart-item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #1f2937;
        }
        .remove-cart-item { background: none; border: none; color: #ef4444; font-size: 1.1rem; cursor: pointer; margin-left: 10px; }

        /* Custom CRUD Forms */
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.8rem; color: #9ca3af; font-weight: 600; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151;
            border-radius: 8px; color: white; outline: none; font-size: 0.95rem;
        }
        .submit-btn {
            width: 100%; padding: 14px; background: #10b981; color: white; border: none;
            border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .crud-list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #1f2937; padding: 12px; margin-bottom: 6px; border-radius: 8px;
        }

        /* 4s Timeout Undo Toast Notification */
        #toast {
    position: fixed; 
    bottom: 95px; 
    left: 16px; 
    right: 16px;
    background: #1f2937; 
    border: 2px solid #374151; 
    padding: 16px;
    border-radius: 12px; 
    display: none; /* Starts completely invisible */
    justify-content: space-between; 
    align-items: center;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
    z-index: 9999; /* Forces it on top of everything else */
}
        #toast.show { transform: translateY(0); }
        .undo-btn { background: none; border: none; color: #34d399; font-weight: 700; font-size: 0.9rem; cursor: pointer; }

        /* Sticky Footer Navigation */
        footer { 
            position: fixed; bottom: 0; width: 100%; background: #111827; 
            padding: 14px 16px; border-top: 1px solid #1f2937; z-index: 10;
            display: flex; gap: 12px;
        }
        .footer-btn { flex-grow: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #cart-toggle-btn { background-color: #374151; color: white; position: relative; }
        .cart-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 0.75rem; padding: 3px 7px; border-radius: 50%; font-weight: bold; }
        #send-btn { background-color: #25D366; color: white; flex-grow: 2; }
        .loading { text-align: center; padding: 40px; font-size: 1rem; color: #9ca3af; }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">🛒 Grocery List</h1>
    </header>

    <div class="action-row">
        <button class="action-btn" onclick="openPanel('panel-manage')">⚙️ Manage Items</button>
    </div>

    <div class="search-container">
        <input type="text" id="search-bar" placeholder="Search vegetables, snacks, or staples..." oninput="filterItems()">
    </div>

    <main id="grocery-container">
        <div class="loading">Loading database...</div>
    </main>

    <div id="toast">
        <span id="toast-msg">Item removed</span>
        <button class="undo-btn" onclick="triggerUndo()">UNDO</button>
    </div>

    <footer>
        <button id="cart-toggle-btn" class="footer-btn" onclick="openPanel('panel-cart')">
            🛒 View Cart <span id="global-badge" class="cart-badge" style="display:none;">0</span>
        </button>
        <button id="send-btn" class="footer-btn" onclick="sendToWhatsApp()">💬 Send via WhatsApp</button>
    </footer>

    <div id="overlay-bg" class="overlay" onclick="closeAllPanels()"></div>

    <div id="panel-cart" class="panel">
        <div class="panel-header">
            <span class="panel-title">🛒 Current Cart Details</span>
            <button class="close-panel" onclick="closeAllPanels()">✕</button>
        </div>
        <div class="panel-content" id="cart-list-render">
            </div>
    </div>

    <div id="panel-manage" class="panel">
        <div class="panel-header">
            <span class="panel-title">⚙️ Manage Item Database</span>
            <button class="close-panel" onclick="closeAllPanels()">✕</button>
        </div>
        <div class="panel-content">
            <div style="border-bottom: 1px solid #1f2937; padding-bottom: 16px; margin-bottom: 16px;">
                <h3 style="font-size:0.9rem; margin-bottom:10px; color:#10b981;">➕ Add Custom Missing Item</h3>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="add-name" placeholder="e.g., Matta Rice Vadi">
                </div>
                <div class="form-group">
                    <label>Category Grouping</label>
                    <select id="add-cat">
                        <option value="Fresh Produce 🍅">Fresh Produce 🍅</option>
                        <option value="Staples & Dals 🌾">Staples & Dals 🌾</option>
                        <option value="Biscuits & Snacks 🍪">Biscuits & Snacks 🍪</option>
                        <option value="Dairy & Breakfast 🥛">Dairy & Breakfast 🥛</option>
                    </select>
                </div>
                <button class="submit-btn" onclick="createNewItem()">Save Product to App</button>
            </div>
            <div>
                <h3 style="font-size:0.9rem; margin-bottom:10px; color:#ef4444;">🗑️ Remove Existing Master Items</h3>
                <div id="crud-items-list" style="max-height: 250px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

<script>
    // Pure brandless Kerala Vegetable & Snack Baseline Dictionary
    const initialDataset = [
        { id: "kv_matta_unda", name: "Matta Rice Unda", category: "Staples & Dals 🌾" },
        { id: "kv_matta_vadi", name: "Matta Rice Vadi", category: "Staples & Dals 🌾" },
        { id: "kv_pachari", name: "Raw Rice (Pachari)", category: "Staples & Dals 🌾" },
        { id: "kv_cherupayar", name: "Green Gram (Cherupayar)", category: "Staples & Dals 🌾" },
        { id: "kv_kadala", name: "Brown Chickpeas (Kadala)", category: "Staples & Dals 🌾" },
        { id: "kv_parippu", name: "Toor Dal (Thuvara Parippu)", category: "Staples & Dals 🌾" },
        { id: "kv_puttu_podi", name: "Puttu Podi", category: "Staples & Dals 🌾" },
        { id: "kv_atta", name: "Wheat Flour (Atta)", category: "Staples & Dals 🌾" },
        { id: "kv_vellam", name: "Jaggery (Vellam)", category: "Staples & Dals 🌾" },
        { id: "kv_sugar", name: "Sugar (Panchasara)", category: "Staples & Dals 🌾" },
        { id: "kv_coconut_oil", name: "Coconut Oil (Velichenna)", category: "Staples & Dals 🌾" },
        
        { id: "kv_tomato", name: "Tomato", category: "Fresh Produce 🍅" },
        { id: "kv_onion", name: "Onion (Savaala)", category: "Fresh Produce 🍅" },
        { id: "kv_potato", name: "Potato (Urulakizhangu)", category: "Fresh Produce 🍅" },
        { id: "kv_green_chilli", name: "Green Chilli", category: "Fresh Produce 🍅" },
        { id: "kv_ginger", name: "Ginger (Inchi)", category: "Fresh Produce 🍅" },
        { id: "kv_kappa", name: "Tapioca (Kappa)", category: "Fresh Produce 🍅" },
        { id: "kv_kaya", name: "Raw Banana (Kaya)", category: "Fresh Produce 🍅" },
        { id: "kv_mathanga", name: "Pumpkin (Mathanga)", category: "Fresh Produce 🍅" },
        
        { id: "kv_banana_chips", name: "Kaya Varuthathu (Banana Chips)", category: "Biscuits & Snacks 🍪" },
        { id: "kv_sharkara", name: "Sharkara Varatti", category: "Biscuits & Snacks 🍪" },
        { id: "kv_achappam", name: "Achappam", category: "Biscuits & Snacks 🍪" },
        { id: "kv_unniyappam", name: "Unniyappam", category: "Biscuits & Snacks 🍪" },
        { id: "kv_chakka_chips", name: "Jackfruit Chips", category: "Biscuits & Snacks 🍪" },
        { id: "kv_rusk", name: "Rusk Pack", category: "Biscuits & Snacks 🍪" },
        { id: "kv_marayoor_jaggery", name: "Marayoor Jaggery Drops", category: "Biscuits & Snacks 🍪" },

        { id: "kv_milk", name: "Milk Packet", category: "Dairy & Breakfast 🥛" },
        { id: "kv_curd", name: "Curd Pouch", category: "Dairy & Breakfast 🥛" },
        { id: "kv_bread", name: "Bread White Slice", category: "Dairy & Breakfast 🥛" }
    ];

    // Data Load Sync Checks
    let groceryItems = JSON.parse(localStorage.getItem('userCustomDataset')) || initialDataset;
    let cart = JSON.parse(localStorage.getItem('activeCartEngine')) || {};
    let itemUnits = JSON.parse(localStorage.getItem('activeItemUnits')) || {};
    let historyFrequency = JSON.parse(localStorage.getItem('megaGroceryHistory')) || {};
    
    let searchQuery = "";
    let toastTimeout = null;
    let lastDeletedSnapshot = null;

    // Slide Panels Execution Engine
    function openPanel(id) {
        document.getElementById('overlay-bg').style.display = 'block';
        setTimeout(() => document.getElementById('overlay-bg').style.opacity = '1', 10);
        
        const targetPanel = document.getElementById(id);
        targetPanel.style.display = 'flex';
        setTimeout(() => targetPanel.style.bottom = '0', 50);
        
        if (id === 'panel-cart') renderCartDrawer();
        if (id === 'panel-manage') renderCRUDDatabaseList();
    }

    function closeAllPanels() {
        document.getElementById('overlay-bg').style.opacity = '0';
        setTimeout(() => document.getElementById('overlay-bg').style.display = 'none', 200);
        
        const panels = document.querySelectorAll('.panel');
        panels.forEach(p => p.style.bottom = '-100%');
    }

    // Dynamic database CRUD adjustments
    function createNewItem() {
        const nameInput = document.getElementById('add-name');
        const catSelect = document.getElementById('add-cat');
        const val = nameInput.value.trim();
        
        if (!val) { alert("Please input a valid item label!"); return; }
        
        const newObj = {
            id: 'custom_' + Date.now(),
            name: val,
            category: catSelect.value
        };
        
        groceryItems.unshift(newObj);
        localStorage.setItem('userCustomDataset', JSON.stringify(groceryItems));
        nameInput.value = "";
        
        renderCRUDDatabaseList();
        renderItems();
    }

    function removeMasterItem(id) {
        if(confirm("Are you sure you want to permanently delete this item from the entire app dictionary?")) {
            groceryItems = groceryItems.filter(item => item.id !== id);
            localStorage.setItem('userCustomDataset', JSON.stringify(groceryItems));
            delete cart[id];
            saveCartState();
            renderCRUDDatabaseList();
            renderItems();
        }
    }

    function renderCRUDDatabaseList() {
        const target = document.getElementById('crud-items-list');
        target.innerHTML = '';
        groceryItems.forEach(item => {
            const row = document.createElement('div');
            row.className = 'crud-list-item';
            row.innerHTML = `
                <div>
                    <div style="font-size:0.9rem; font-weight:600;">${item.name}</div>
                    <div style="font-size:0.7rem; color:#9ca3af;">${item.category}</div>
                </div>
                <button onclick="removeMasterItem('${item.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:1rem;">🗑️</button>
            `;
            target.appendChild(row);
        });
    }

    // UI Content Renderer
    function renderItems() {
        const container = document.getElementById('grocery-container');
        container.innerHTML = '';
        updateGlobalFooterBadge();

        // 1. Recommendation Query Check (Past Purchases Layer)
        const frequentItems = groceryItems
            .filter(item => historyFrequency[item.id] && historyFrequency[item.id] > 0)
            .sort((a, b) => historyFrequency[b.id] - historyFrequency[a.id])
            .slice(0, 4);

        if (frequentItems.length > 0 && !searchQuery) {
            renderCategorySection("⭐️ Frequently Ordered", frequentItems, container);
        }

        // 2. Active Main Filtering Loops
        let matches = groceryItems;
        if (searchQuery.length >= 2) {
            matches = groceryItems.filter(item => item.name.toLowerCase().includes(searchQuery));
            // Sorting Matches alphabetically
            matches.sort((a, b) => a.name.localeCompare(b.name));
        }

        const categories = [...new Set(matches.map(item => item.category))];
        categories.forEach(category => {
            const itemsInCat = matches.filter(item => item.category === category);
            renderCategorySection(category, itemsInCat, container);
        });

        if (matches.length === 0) {
            container.innerHTML = '<div class="loading">No local items found.</div>';
        }
    }

    function renderCategorySection(title, items, targetContainer) {
        const catDiv = document.createElement('div');
        catDiv.className = 'category-section';
        catDiv.innerHTML = `<h2>${title}</h2>`;
        
        items.forEach(item => {
            const qty = cart[item.id] || 0;
            const selectedUnit = itemUnits[item.id] || "Qty";
            
            const itemRow = document.createElement('div');
            itemRow.className = 'item-row';
            itemRow.innerHTML = `
                <div class="item-details">
                    <div class="item-title-block">
                        <span class="item-name">${item.name}</span>
                        <span class="item-meta">${item.category.split(' ')[0]} Entry</span>
                    </div>
                </div>
                <div class="controls-wrapper">
                    <select class="unit-selector" onchange="changeUnit('${item.id}', this.value)">
                        <option value="Qty" ${selectedUnit === 'Qty' ? 'selected' : ''}>Qty</option>
                        <option value="Kilos" ${selectedUnit === 'Kilos' ? 'selected' : ''}>Kg</option>
                    </select>
                    <div class="counter">
                        <button onclick="updateQty('${item.id}', -1)">-</button>
                        <span class="qty-count">${qty}</span>
                        <button class="plus" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                </div>`;
            catDiv.appendChild(itemRow);
        });
        targetContainer.appendChild(catDiv);
    }

    // State Mutation Engines
    function updateQty(id, change) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += change;
        if (cart[id] <= 0) delete cart[id];
        
        saveCartState();
        renderItems();
        if (document.getElementById('panel-cart').style.display === 'flex') renderCartDrawer();
    }

    function changeUnit(id, unit) {
        itemUnits[id] = unit;
        localStorage.setItem('activeItemUnits', JSON.stringify(itemUnits));
        if (document.getElementById('panel-cart').style.display === 'flex') renderCartDrawer();
    }

    function saveCartState() {
        localStorage.setItem('activeCartEngine', JSON.stringify(cart));
    }

    function filterItems() {
        searchQuery = document.getElementById('search-bar').value.toLowerCase().trim();
        renderItems();
    }

    function updateGlobalFooterBadge() {
        const total = Object.values(cart).reduce((a, b) => a + b, 0);
        const badge = document.getElementById('global-badge');
        if (total > 0) {
            badge.innerText = total;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
    }

    // Modal View Cart Content Builder
    function renderCartDrawer() {
        const wrapper = document.getElementById('cart-list-render');
        wrapper.innerHTML = '';
        let hasItems = false;

        groceryItems.forEach(item => {
            if (cart[item.id]) {
                hasItems = true;
                const unit = itemUnits[item.id] || "Qty";
                const row = document.createElement('div');
                row.className = 'cart-item-row';
                row.innerHTML = `
                    <div>
                        <div style="font-weight:600;">${item.name}</div>
                        <div style="font-size:0.75rem; color:#9ca3af;">Setting: ${unit} metric</div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <div class="counter">
                            <button onclick="updateQty('${item.id}', -1)">-</button>
                            <span class="qty-count">${cart[item.id]}</span>
                            <button class="plus" onclick="updateQty('${item.id}', 1)">+</button>
                        </div>
                        <button class="remove-cart-item" onclick="forceRemoveCartItem('${item.id}')">🗑️</button>
                    </div>
                `;
                wrapper.appendChild(row);
            }
        });

        if (!hasItems) {
            wrapper.innerHTML = '<div style="text-align:center; padding:30px; color:#6b7280;">Your cart is empty. Add elements below!</div>';
        }
    }

    // Force Remove + 4s Undo Logic Engine Block
function forceRemoveCartItem(id) {
    lastDeletedSnapshot = { id: id, qty: cart[id] };

    delete cart[id];
    saveCartState();
    renderCartDrawer();
    renderItems();

    // Force show the popup instantly
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').innerText = "Item removed from cart";
    toast.style.display = "flex"; 

    // Hard timer to completely hide it after 4 seconds
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
        toast.style.display = "none";
        lastDeletedSnapshot = null;
    }, 4000); 
}

function triggerUndo() {
    if (lastDeletedSnapshot) {
        cart[lastDeletedSnapshot.id] = lastDeletedSnapshot.qty;
        saveCartState();
        renderItems();
        renderCartDrawer();
        
        // Kill the popup instantly on click
        document.getElementById('toast').style.display = "none";
        lastDeletedSnapshot = null;
    }
}

    // WhatsApp String Formatter Delivery Engine
    function sendToWhatsApp() {
        let orderText = "📝 *GROCERY LIST ORDER*\n-------------------------\n";
        let hasItems = false;

        groceryItems.forEach(item => {
            if (cart[item.id]) {
                const unit = itemUnits[item.id] || "Qty";
                const displayUnit = unit === "Kilos" ? "Kg" : "Nos";
                orderText += `✅ *${item.name}* → *${cart[item.id]} ${displayUnit}*\n`;
                hasItems = true;
                
                // Track frequency metrics for past purchases loop
                historyFrequency[item.id] = (historyFrequency[item.id] || 0) + 1;
            }
        });

        if (!hasItems) { alert("Please build your cart list before checking out!"); return; }
        orderText += "-------------------------\nPlease process this delivery checklist. Thanks!";

        localStorage.setItem('megaGroceryHistory', JSON.stringify(historyFrequency));
        window.open(`https://wa.me/?text=${encodeURIComponent(orderText)}`, '_blank');
        
        // Wipe local cart cache upon checkout submission
        cart = {};
        saveCartState();
        renderItems();
        closeAllPanels();
    }

    // Initialize View Layer execution
    renderItems();
</script>
</body>
</html>
